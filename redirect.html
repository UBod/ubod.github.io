<!DOCTYPE html>
<html>
<head>
    <title>Redirecting...</title>
    <script type="text/javascript">
        // Checks if the current window is the top-most window
        if (window.top !== window.self) {
            // If it's in a frame, force the top window to the new URL
            window.top.location.href = "https://ubod.github.io/";
        } else {
            // If it's not in a frame, just redirect normally
            window.location.href = "https://ubod.github.io/";
        }
    </script>
</head>
<body>
    <p>It seems your browser does not permit immediate forwarding to another URL. So, please click the following link: <a href="https://ubod.github.io/" target="_top">Ulrich Bodenhofer's Personal Homepage</a> (link takes you to <a href="https://ubod.github.io/" target="_top">https://ubod.github.io/</a>).</p>
</body>
</html>
